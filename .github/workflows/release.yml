name: release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

# main への push が連続したとき、古い「キャッシュ温め」ビルドを取り消して
# CI 時間を節約する。タグ (リリース) ビルドは ref ごとにグループが分かれる上
# cancel-in-progress も false なので、取り消されることはない。
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}

# corepack が pnpm を取得する際の対話プロンプトを無効化 (CI は非対話)。
env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"

jobs:
  build:
    name: build (${{ matrix.platform }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Enable pnpm (corepack)
        run: corepack enable

      - name: Get pnpm store directory
        shell: bash
        run: echo "PNPM_STORE_PATH=$(pnpm store path)" >> "$GITHUB_ENV"

      - name: Cache pnpm store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Cache Tauri bundler tools (NSIS / WiX)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~\AppData\Local\tauri\NSIS
            ~\AppData\Local\tauri\WixTools
          key: tauri-bundler-${{ runner.os }}-v1

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Sync version to tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_REF#v}"
          echo "Syncing project version to ${VERSION}"
          VERSION="${VERSION}" node -e '
            const fs = require("fs");
            const v = process.env.VERSION;
            for (const f of ["package.json", "src-tauri/tauri.conf.json"]) {
              const j = JSON.parse(fs.readFileSync(f, "utf8"));
              j.version = v;
              fs.writeFileSync(f, JSON.stringify(j, null, 2) + "\n");
            }
            let toml = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
            toml = toml.replace(/^version = "[^"]*"/m, "version = \"" + v + "\"");
            fs.writeFileSync("src-tauri/Cargo.toml", toml);
            let lock = fs.readFileSync("src-tauri/Cargo.lock", "utf8");
            lock = lock.replace(/(name = "noobdb"\nversion = ")[^"]*"/, "$1" + v + "\"");
            fs.writeFileSync("src-tauri/Cargo.lock", lock);
          '

      # タグ以外 (main への push / 手動実行) では、リリースを作らずに
      # ビルドだけ走らせて rust-cache (target) を main スコープに温める。
      # タグビルドはここで作られた main スコープのキャッシュにフォールバックして
      # ヒットするようになる。
      - name: Build Tauri app (cache warm, no release)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: pnpm tauri build -- ${{ matrix.args }}

      # タグ push のときだけ実際のリリース (ドラフト) を作成する。
      - name: Build Tauri app (release)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "noobDB ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # 出荷バイナリ (インストーラ / 実行ファイル) のサイズを Job Summary に可視化する
      # (#549)。バンドルサイズ可視化 (#443) のアプリ本体版で、方針も同じ:
      # 当面は閾値で fail させず可視化のみ、追加ツールは増やさずシェル標準機能だけで
      # 集計する。cache-warm ビルド (pnpm tauri build) でもリリースビルド
      # (tauri-action) でも成果物は同じ target/release/bundle 配下に出るため、両経路の
      # 後に always() で 1 回測る。macOS/Linux バンドル追加後 (本 Epic の別 Issue) は
      # .dmg / .AppImage / .deb のグロブが自動的に対象に含まれる。起動時間の監視は
      # 計測の安定性が難しいため本 Issue のスコープ外 (任意/将来拡張) とする。
      - name: Report bundle artifact sizes
        if: always()
        shell: bash
        run: |
          set -uo pipefail
          shopt -s nullglob
          summary="${GITHUB_STEP_SUMMARY:-/dev/stdout}"
          files=(
            src-tauri/target/release/*.exe
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          )
          {
            echo "### 出荷バイナリサイズ (${{ matrix.platform }})"
            echo ""
            echo "| 成果物 | サイズ |"
            echo "| --- | ---: |"
          } >> "$summary"
          if [ ${#files[@]} -eq 0 ]; then
            echo "| (成果物が見つかりませんでした) | — |" >> "$summary"
          else
            for f in "${files[@]}"; do
              bytes=$(stat -c %s "$f" 2>/dev/null || stat -f %z "$f" 2>/dev/null || echo 0)
              human=$(awk -v b="$bytes" 'BEGIN { printf "%.2f MiB", b/1048576 }')
              printf '| `%s` | %s |\n' "$(basename "$f")" "$human" >> "$summary"
            done
          fi
