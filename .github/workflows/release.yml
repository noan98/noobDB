name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: build (${{ matrix.platform }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend deps
        run: npm install

      - name: Sync version to tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_REF#v}"
          echo "Syncing project version to ${VERSION}"
          VERSION="${VERSION}" node -e '
            const fs = require("fs");
            const v = process.env.VERSION;
            for (const f of ["package.json", "src-tauri/tauri.conf.json"]) {
              const j = JSON.parse(fs.readFileSync(f, "utf8"));
              j.version = v;
              fs.writeFileSync(f, JSON.stringify(j, null, 2) + "\n");
            }
            let toml = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
            toml = toml.replace(/^version = "[^"]*"/m, "version = \"" + v + "\"");
            fs.writeFileSync("src-tauri/Cargo.toml", toml);
            let lock = fs.readFileSync("src-tauri/Cargo.lock", "utf8");
            lock = lock.replace(/(name = "tablex"\nversion = ")[^"]*"/, "$1" + v + "\"");
            fs.writeFileSync("src-tauri/Cargo.lock", lock);
          '

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "tableX ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  test:
    name: test (linux)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: testdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: System deps (Tauri 2 prerequisites)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            build-essential curl wget file libssl-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend deps
        run: npm install

      - name: Build frontend (needed for tauri::generate_context!)
        run: npm run build

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --all-targets

      - name: cargo test
        working-directory: src-tauri
        env:
          TABLEX_TEST_MYSQL_URL: mysql://root:rootpw@127.0.0.1:3306/testdb
        run: cargo test
