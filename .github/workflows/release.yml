name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: build (${{ matrix.platform }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend deps
        run: npm ci

      - name: Sync version to tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_REF#v}"
          echo "Syncing project version to ${VERSION}"
          VERSION="${VERSION}" node -e '
            const fs = require("fs");
            const v = process.env.VERSION;
            for (const f of ["package.json", "src-tauri/tauri.conf.json"]) {
              const j = JSON.parse(fs.readFileSync(f, "utf8"));
              j.version = v;
              fs.writeFileSync(f, JSON.stringify(j, null, 2) + "\n");
            }
            let toml = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
            toml = toml.replace(/^version = "[^"]*"/m, "version = \"" + v + "\"");
            fs.writeFileSync("src-tauri/Cargo.toml", toml);
            let lock = fs.readFileSync("src-tauri/Cargo.lock", "utf8");
            lock = lock.replace(/(name = "tablex"\nversion = ")[^"]*"/, "$1" + v + "\"");
            fs.writeFileSync("src-tauri/Cargo.lock", lock);
          '

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "tableX ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
