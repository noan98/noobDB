name: release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

# main への push が連続したとき、古い「キャッシュ温め」ビルドを取り消して
# CI 時間を節約する。タグ (リリース) ビルドは ref ごとにグループが分かれる上
# cancel-in-progress も false なので、取り消されることはない。
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}

jobs:
  build:
    name: build (${{ matrix.platform }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Cache Tauri bundler tools (NSIS / WiX)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~\AppData\Local\tauri\NSIS
            ~\AppData\Local\tauri\WixTools
          key: tauri-bundler-${{ runner.os }}-v1

      - name: Install frontend deps
        run: npm ci

      - name: Sync version to tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_REF#v}"
          echo "Syncing project version to ${VERSION}"
          VERSION="${VERSION}" node -e '
            const fs = require("fs");
            const v = process.env.VERSION;
            for (const f of ["package.json", "src-tauri/tauri.conf.json"]) {
              const j = JSON.parse(fs.readFileSync(f, "utf8"));
              j.version = v;
              fs.writeFileSync(f, JSON.stringify(j, null, 2) + "\n");
            }
            let toml = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
            toml = toml.replace(/^version = "[^"]*"/m, "version = \"" + v + "\"");
            fs.writeFileSync("src-tauri/Cargo.toml", toml);
            let lock = fs.readFileSync("src-tauri/Cargo.lock", "utf8");
            lock = lock.replace(/(name = "noobdb"\nversion = ")[^"]*"/, "$1" + v + "\"");
            fs.writeFileSync("src-tauri/Cargo.lock", lock);
          '

      # タグ以外 (main への push / 手動実行) では、リリースを作らずに
      # ビルドだけ走らせて rust-cache (target) を main スコープに温める。
      # タグビルドはここで作られた main スコープのキャッシュにフォールバックして
      # ヒットするようになる。
      - name: Build Tauri app (cache warm, no release)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm run tauri build -- ${{ matrix.args }}

      # タグ push のときだけ実際のリリース (ドラフト) を作成する。
      - name: Build Tauri app (release)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "noobDB ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
