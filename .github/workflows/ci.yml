name: ci

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# corepack が pnpm を取得する際の対話プロンプトを無効化 (CI は非対話)。
env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"

jobs:
  # 変更されたパスを見て後続ジョブを出し分ける。ワークフロー単位の paths で
  # 丸ごとスキップすると必須チェックが「待機中」のまま固まるため、ここでは
  # ジョブ単位の if: でゲートする (スキップは必須チェックを満たす)。
  changes:
    name: detect changed areas
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      rust: ${{ steps.filter.outputs.rust }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: |
            workflow:
              - '.github/workflows/ci.yml'
            frontend:
              - 'src/**'
              - 'index.html'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.json'
              - 'tsconfig.node.json'
              - 'vite.config.ts'
            rust:
              - 'src-tauri/**'

  frontend:
    name: frontend (typecheck + build)
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Enable pnpm (corepack)
        run: corepack enable

      - name: Get pnpm store directory
        shell: bash
        run: echo "PNPM_STORE_PATH=$(pnpm store path)" >> "$GITHUB_ENV"

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Type-check and build
        run: pnpm run build

      # 未使用エクスポート / 到達不能コード / 未使用依存を検出し、モジュール跨ぎの
      # デッドコード (tsc の noUnusedLocals では拾えない) と IPC ラッパ ⇔ UI 利用の
      # ドリフトを防ぐ (#470)。ベースラインは knip.json で green。新規の未使用
      # エクスポートが入ると fail する。
      - name: Dead-code / unused-export check (knip)
        run: pnpm run knip

      # カバレッジ計測込みで実行し、`vite.config.ts` の coverage.thresholds を
      # 下回ったらここで fail させる (品質ゲート / #290)。
      - name: Unit tests (Vitest) + coverage threshold
        run: pnpm test --coverage

  rust-fmt:
    name: rust (fmt)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

  # clippy と nextest は別ジョブに分割して並列実行する。clippy は cargo check
  # 相当 (メタデータ emit のみ)、nextest は実バイナリ生成 (codegen + link) で、
  # cargo はこの 2 モードの成果物を共有しない。同一ジョブで直列に走らせると依存
  # ツリーが実質二重コンパイルされて積み上がるため、並列ジョブにして壁時計時間を
  # max(clippy, test) に縮める。各ジョブは rust-cache のキーが分かれるので
  # キャッシュは互いに干渉しない。CI では incremental コンパイルは無益で
  # オーバーヘッド・キャッシュ肥大を招くだけなので CARGO_INCREMENTAL=0 にする。
  rust-clippy:
    name: rust (clippy)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "0"
      # sccache をコンパイルキャッシュとして使う (#417)。rust-cache が target
      # ディレクトリをキャッシュするのに対し、sccache はコンパイル単位 (rustc 呼び
      # 出し) をキャッシュし、Cargo.lock 変更やキャッシュミス時のクリーンビルドを
      # 高速化する。SCCACHE_DIR を actions/cache で永続化してブランチ跨ぎで再利用する。
      RUSTC_WRAPPER: sccache
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # RUSTC_WRAPPER=sccache を有効にしているため、rustc を呼ぶ後続ステップ
      # (rust-cache のツールチェーン情報取得など) より前に sccache 本体を導入する。
      - name: Install sccache
        uses: taiki-e/install-action@e49978b799e49ff429d162b7a30601a569ab6538 # v2.81.1
        with:
          tool: sccache

      # clippy は check モードでリンクしないが、build.rs (tauri-build 等) の
      # 生成・実行で linker を使うため clang + mold は必要
      # (src-tauri/.cargo/config.toml が Linux ターゲットのリンカに指定)。
      - name: System deps (Tauri 2 prerequisites)
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.5.4
        with:
          packages: libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev librsvg2-dev libxdo-dev libayatana-appindicator3-dev build-essential curl wget file libssl-dev clang mold
          version: tauri-2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Enable pnpm (corepack)
        run: corepack enable

      - name: Get pnpm store directory
        shell: bash
        run: echo "PNPM_STORE_PATH=$(pnpm store path)" >> "$GITHUB_ENV"

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "./src-tauri -> target"
          key: clippy

      # sccache のローカルディスクキャッシュを永続化する。キーは Cargo.lock の
      # ハッシュ + ジョブ種別 (clippy) で分け、rust-cache の target キャッシュとは
      # 別物として管理する。Cargo.lock が変わってもプレフィックス一致で前回分を
      # 復元し、差分のみ再コンパイルする。
      - name: Cache sccache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-${{ runner.os }}-clippy-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            sccache-${{ runner.os }}-clippy-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build frontend (needed for tauri::generate_context!)
        run: pnpm run build

      # clippy は rustc ドライバなので型チェック (cargo check 相当) を内包する。
      # 別途 cargo check を走らせると、共有されないコンパイルがほぼ二重に走るため
      # clippy のみに集約している。
      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --locked -- -D warnings

      # sccache のヒット率を Job ログに出して効果計測の材料にする (#417)。
      - name: sccache stats
        if: always()
        run: sccache --show-stats

  # 依存ライセンスの許可リスト検査と、RustSec Advisory DB による既知脆弱性チェック
  # を cargo-deny で行う (#332)。設定は src-tauri/deny.toml。cargo metadata を読む
  # だけでコンパイルは不要なため、Tauri のシステム依存やフロントエンドビルドは要らず
  # 軽量に走る。cargo-deny は他ツールと同様 taiki-e/install-action でプリビルド
  # バイナリを入れる (新しいアクションを増やさず既存の固定 SHA に揃える)。
  rust-deny:
    name: rust (deny)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-deny
        uses: taiki-e/install-action@e49978b799e49ff429d162b7a30601a569ab6538 # v2.81.1
        with:
          tool: cargo-deny

      - name: cargo deny check
        run: cargo deny --manifest-path src-tauri/Cargo.toml check

  rust-test:
    name: rust (test)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "0"
      # sccache をコンパイルキャッシュとして使う (#417)。カバレッジ計装ビルド
      # (-C instrument-coverage) は sccache がキャッシュ対象外として素通しするため、
      # 主な効果は依存クレートのコンパイルに現れる。rust-cache (target) とは別管理。
      RUSTC_WRAPPER: sccache
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: testdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # RUSTC_WRAPPER=sccache を有効にしているため、rustc を呼ぶ後続ステップより
      # 前に sccache 本体を導入する。
      - name: Install sccache
        uses: taiki-e/install-action@e49978b799e49ff429d162b7a30601a569ab6538 # v2.81.1
        with:
          tool: sccache

      # clang + mold はビルド高速化用 (src-tauri/.cargo/config.toml が
      # Linux ターゲットのリンカに clang + mold を指定している)。mold で
      # テストバイナリ群のリンク時間を短縮する。
      - name: System deps (Tauri 2 prerequisites)
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.5.4
        with:
          packages: libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev librsvg2-dev libxdo-dev libayatana-appindicator3-dev build-essential curl wget file libssl-dev clang mold
          version: tauri-2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Enable pnpm (corepack)
        run: corepack enable

      - name: Get pnpm store directory
        shell: bash
        run: echo "PNPM_STORE_PATH=$(pnpm store path)" >> "$GITHUB_ENV"

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # llvm-tools-preview は cargo-llvm-cov の計装ビルドに必要なコンポーネント。
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "./src-tauri -> target"
          key: test

      # sccache のローカルディスクキャッシュを永続化する (ジョブ種別 test で分離)。
      - name: Cache sccache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-${{ runner.os }}-test-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            sccache-${{ runner.os }}-test-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@e49978b799e49ff429d162b7a30601a569ab6538 # v2.81.1
        with:
          tool: cargo-nextest

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@e49978b799e49ff429d162b7a30601a569ab6538 # v2.81.1
        with:
          tool: cargo-llvm-cov

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build frontend (needed for tauri::generate_context!)
        run: pnpm run build

      # nextest を llvm-cov 計装下で実行し、カバレッジ生データのみ収集する
      # (--no-report)。MySQL/PostgreSQL の両サービスコンテナを指す URL を渡し、
      # 両ドライバの統合テストを CI で実走させる。SQLite は環境変数不要で常に走る。
      - name: cargo llvm-cov nextest
        working-directory: src-tauri
        env:
          NOOBDB_TEST_MYSQL_URL: mysql://root:rootpw@127.0.0.1:3306/testdb
          NOOBDB_TEST_POSTGRES_URL: postgres://postgres:postgres@127.0.0.1:5432/testdb
        run: cargo llvm-cov nextest --no-report --locked --all-targets

      # 収集済みデータから lcov レポートを生成し、サマリ表を Job Summary に出して
      # PR ごとのカバレッジを可視化する。
      - name: Coverage report
        working-directory: src-tauri
        run: |
          cargo llvm-cov report --lcov --output-path lcov.info
          {
            echo '### Rust coverage'
            echo ''
            echo '```'
            cargo llvm-cov report --summary-only
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # 品質ゲート (#290): 行カバレッジが閾値を下回ったら CI を fail させる。
      # サマリ出力の後に置くことで、閾値割れで落ちても Job Summary には実測値が
      # 残り、原因を追いやすくする。
      #
      # 初期閾値 48% の根拠: ローカル (SQLite のみ。MySQL/PostgreSQL 統合テストは
      # 環境変数未設定でスキップ) の実測が lines 48.56%。CI はこの両ドライバの
      # 統合テストも実走する**上位集合**なので、行カバレッジは必ずローカル以上に
      # なる。したがって 48% は CI で確実に通る保守的な開始値。テストが充実したら
      # 段階的に引き上げる。
      - name: Enforce coverage threshold
        working-directory: src-tauri
        run: cargo llvm-cov report --fail-under-lines 48

      # sccache のヒット率を Job ログに出して効果計測の材料にする (#417)。
      - name: sccache stats
        if: always()
        run: sccache --show-stats

  # Windows ターゲットの PR 事前検証 (#392)。Rust のコンパイル・テストは普段
  # Linux でしか走らず、Windows 固有の挙動 (keyring・ファイルパス・改行コード・
  # MSVC リンカ) のリグレッションは release.yml の main push まで検出できなかった。
  # ここで PR 段階で clippy + SQLite ユニット/統合テストを Windows 上で実行する。
  # Tauri の全スタックビルド (WebView2 等) は不要で、MSVC toolchain のみで足りる。
  # MySQL/PostgreSQL は接続 URL 環境変数を渡さないので統合テストはスキップされ、
  # SQLite 統合テスト (外部サービス不要) は常時実行される。
  rust-windows:
    name: rust (windows)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: windows-latest
    env:
      CARGO_INCREMENTAL: "0"
      # Linux ジョブと同じく sccache でコンパイルキャッシュを効かせる (#417)。
      # キャッシュキーは runner.os (Windows) を含むので Linux とは自動的に分離される。
      RUSTC_WRAPPER: sccache
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # RUSTC_WRAPPER=sccache を有効にしているため、rustc を呼ぶ後続ステップより
      # 前に sccache 本体を導入する。
      - name: Install sccache
        uses: taiki-e/install-action@e49978b799e49ff429d162b7a30601a569ab6538 # v2.81.1
        with:
          tool: sccache

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Enable pnpm (corepack)
        run: corepack enable

      - name: Get pnpm store directory
        shell: bash
        run: echo "PNPM_STORE_PATH=$(pnpm store path)" >> "$GITHUB_ENV"

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # Windows では config.toml が MSVC リンカに lld-link を指定している。
      # windows-latest には LLVM がプリインストール済みで lld-link が PATH 上にある。
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "./src-tauri -> target"
          key: windows

      - name: Cache sccache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-${{ runner.os }}-windows-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            sccache-${{ runner.os }}-windows-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@e49978b799e49ff429d162b7a30601a569ab6538 # v2.81.1
        with:
          tool: cargo-nextest

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build frontend (needed for tauri::generate_context!)
        run: pnpm run build

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --locked -- -D warnings

      # SQLite 統合テスト (tests/sqlite_integration.rs) は外部サービス不要で常時
      # 実行される。MySQL/PostgreSQL は URL 環境変数を渡していないのでスキップ。
      - name: cargo nextest run
        working-directory: src-tauri
        run: cargo nextest run --locked --all-targets

      - name: sccache stats
        if: always()
        run: sccache --show-stats
