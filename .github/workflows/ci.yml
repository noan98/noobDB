name: ci

# pull_request に加えて main への push でも起動する。pull_request 実行で保存される
# キャッシュ (rust-cache / sccache / pnpm) は PR のマージ ref スコープにしか残らず
# 他の PR からは参照できないため、main push 時に同じジョブを走らせてキャッシュを
# main スコープへ保存する (全 PR ブランチがフォールバックで復元できる唯一のスコープ)。
# これが無いと新規 PR ブランチの初回 Rust ビルドは毎回コールドになる。マージ後の
# main の健全性確認 (post-merge check) も兼ねる。
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# corepack が pnpm を取得する際の対話プロンプトを無効化 (CI は非対話)。
env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"

jobs:
  # 変更されたパスを見て後続ジョブを出し分ける。ワークフロー単位の paths で
  # 丸ごとスキップすると必須チェックが「待機中」のまま固まるため、ここでは
  # ジョブ単位の if: でゲートする (スキップは必須チェックを満たす)。
  changes:
    name: detect changed areas
    runs-on: ubuntu-latest
    # 各ジョブに timeout-minutes を付け、ハング時にデフォルト 6 時間ランナーを
    # 占有し続けるのを防ぐ (実測に余裕を持たせた保守的な上限。正常時は影響なし)。
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      rust: ${{ steps.filter.outputs.rust }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      # pull_request イベントでは paths-filter は API 比較で checkout 不要だが、
      # push (main) イベントではローカルの git 履歴を比較するため checkout が必要。
      # push 比較は直前コミットとの差分なので、親コミットまで含む fetch-depth: 2 で
      # paths-filter が自前 fetch にフォールバックせず確実に履歴比較できるようにする。
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 2

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            workflow:
              - '.github/workflows/ci.yml'
            frontend:
              - 'src/**'
              - 'index.html'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.json'
              - 'tsconfig.node.json'
              - 'vite.config.ts'
              - 'vitest.browser.config.ts'
            rust:
              - 'src-tauri/**'

  frontend:
    name: frontend (typecheck + build)
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # ジョブ全体の所要時間可視化 (#565) の起点。checkout より前に置き、
      # セットアップ込みの壁時計時間を測る。閾値 fail は設けない (可視化のみ)。
      - name: Record job start time (#565)
        run: echo "NOOBDB_JOB_START=$(date +%s)" >> "$GITHUB_ENV"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Enable pnpm (corepack)
        run: corepack enable

      - name: Get pnpm store directory
        shell: bash
        run: echo "PNPM_STORE_PATH=$(pnpm store path)" >> "$GITHUB_ENV"

      - name: Cache pnpm store
        id: pnpm-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Type-check and build
        run: pnpm run build

      # ビルド成果物 (dist/) の JS/CSS サイズを計測して Job Summary に出力する
      # (#443)。カバレッジ可視化と同じく当面は閾値による fail を設けず可視化のみ。
      # チャート可視化などライブラリ追加に伴うバンドル肥大化を PR で早期に検知する。
      - name: Bundle size report
        run: pnpm run bundle-size

      # 未使用エクスポート / 到達不能コード / 未使用依存を検出し、モジュール跨ぎの
      # デッドコード (tsc の noUnusedLocals では拾えない) と IPC ラッパ ⇔ UI 利用の
      # ドリフトを防ぐ (#470)。ベースラインは knip.json で green。新規の未使用
      # エクスポートが入ると fail する。
      - name: Dead-code / unused-export check (knip)
        run: pnpm run knip

      # カバレッジ計測込みで実行し、`vite.config.ts` の coverage.thresholds を
      # 下回ったらここで fail させる (品質ゲート / #290)。
      - name: Unit tests (Vitest) + coverage threshold
        run: pnpm test --coverage

      # ジョブ所要時間とキャッシュヒット有無を Job Summary へ出力する (#565)。
      # バンドルサイズ (#443) / カバレッジ (#482) と同じく可視化のみで fail
      # させない。ビルド時間退行 (キャッシュミス・依存増) の早期発見が目的。
      - name: Job timing & cache summary (#565)
        if: always()
        run: |
          ELAPSED=$(( $(date +%s) - NOOBDB_JOB_START ))
          {
            echo "### frontend (typecheck + build) 所要時間・キャッシュ"
            echo ""
            echo "| 項目 | 値 |"
            echo "| --- | --- |"
            echo "| 所要時間 | ${ELAPSED} 秒 |"
            echo "| pnpm store キャッシュヒット | ${{ steps.pnpm-cache.outputs.cache-hit }} |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

  # 実ブラウザ (Vitest ブラウザモード / Playwright + headless Chromium) で主要画面の
  # レンダリングとビジュアル回帰を検証する (#306)。jsdom の純ロジックテスト
  # (frontend ジョブ) とは実行環境が異なるため別ジョブに分離している。Chakra UI
  # 全面移行 (#271) のレイアウト/テーマ追従の退行を実 CSS で捕まえる受け皿。
  #
  # ビジュアル回帰のベースライン PNG は CI と同一環境 (この ubuntu-latest /
  # Chromium) で生成・コミットする運用 (.github/workflows/visual-baseline.yml の
  # workflow_dispatch で更新)。ローカル (macOS/Windows) の描画差による false
  # positive を避けるため、ベースライン生成は常にこの環境で行う。
  frontend-visual:
    name: frontend (browser render + visual)
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Enable pnpm (corepack)
        run: corepack enable

      - name: Get pnpm store directory
        shell: bash
        run: echo "PNPM_STORE_PATH=$(pnpm store path)" >> "$GITHUB_ENV"

      - name: Cache pnpm store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # Playwright の Chromium とシステム依存を導入する。--only-shell で headless
      # 実行に必要な chromium-headless-shell のみを入れて軽量化する。
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps --only-shell chromium

      # 主要画面のレンダリングスモーク (screens.browser.test.tsx) を実行する。
      # ビジュアル回帰 (visual.browser.test.tsx) は VITE_RUN_VISUAL=1 のときだけ走る
      # ため、ここでは既定でスキップされる (ベースライン PNG が無い環境では
      # toMatchScreenshot が失敗するため)。ベースラインを visual-baseline.yml の
      # workflow_dispatch で生成・コミットしたら、この step に
      # `env: VITE_RUN_VISUAL: "1"` を足してビジュアル回帰も必須化できる。
      - name: Browser render smoke (Vitest)
        run: pnpm test:browser

  rust-fmt:
    name: rust (fmt)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

  # clippy と nextest は別ジョブに分割して並列実行する。clippy は cargo check
  # 相当 (メタデータ emit のみ)、nextest は実バイナリ生成 (codegen + link) で、
  # cargo はこの 2 モードの成果物を共有しない。同一ジョブで直列に走らせると依存
  # ツリーが実質二重コンパイルされて積み上がるため、並列ジョブにして壁時計時間を
  # max(clippy, test) に縮める。各ジョブは rust-cache のキーが分かれるので
  # キャッシュは互いに干渉しない。CI では incremental コンパイルは無益で
  # オーバーヘッド・キャッシュ肥大を招くだけなので CARGO_INCREMENTAL=0 にする。
  rust-clippy:
    name: rust (clippy)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_INCREMENTAL: "0"
      # sccache をコンパイルキャッシュとして使う (#417)。rust-cache が target
      # ディレクトリをキャッシュするのに対し、sccache はコンパイル単位 (rustc 呼び
      # 出し) をキャッシュし、Cargo.lock 変更やキャッシュミス時のクリーンビルドを
      # 高速化する。SCCACHE_DIR を actions/cache で永続化してブランチ跨ぎで再利用する。
      RUSTC_WRAPPER: sccache
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
    steps:
      # ジョブ全体の所要時間可視化 (#565) の起点。checkout より前に置き、
      # セットアップ込みの壁時計時間を測る。閾値 fail は設けない (可視化のみ)。
      - name: Record job start time (#565)
        run: echo "NOOBDB_JOB_START=$(date +%s)" >> "$GITHUB_ENV"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # RUSTC_WRAPPER=sccache を有効にしているため、rustc を呼ぶ後続ステップ
      # (rust-cache のツールチェーン情報取得など) より前に sccache 本体を導入する。
      - name: Install sccache
        uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with:
          tool: sccache

      # clippy は check モードでリンクしないが、build.rs (tauri-build 等) の
      # 生成・実行で linker を使うため clang + mold は必要
      # (src-tauri/.cargo/config.toml が Linux ターゲットのリンカに指定)。
      - name: System deps (Tauri 2 prerequisites)
        uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1.6.3
        with:
          packages: libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev librsvg2-dev libxdo-dev libayatana-appindicator3-dev build-essential curl wget file libssl-dev clang mold
          version: tauri-2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Enable pnpm (corepack)
        run: corepack enable

      - name: Get pnpm store directory
        shell: bash
        run: echo "PNPM_STORE_PATH=$(pnpm store path)" >> "$GITHUB_ENV"

      - name: Cache pnpm store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      - name: Cache cargo
        id: rust-cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "./src-tauri -> target"
          key: clippy

      # sccache のローカルディスクキャッシュを永続化する。キーは Cargo.lock の
      # ハッシュ + ジョブ種別 (clippy) で分け、rust-cache の target キャッシュとは
      # 別物として管理する。Cargo.lock が変わってもプレフィックス一致で前回分を
      # 復元し、差分のみ再コンパイルする。
      - name: Cache sccache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-${{ runner.os }}-clippy-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            sccache-${{ runner.os }}-clippy-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build frontend (needed for tauri::generate_context!)
        run: pnpm run build

      # clippy は rustc ドライバなので型チェック (cargo check 相当) を内包する。
      # 別途 cargo check を走らせると、共有されないコンパイルがほぼ二重に走るため
      # clippy のみに集約している。
      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --locked -- -D warnings

      # ジョブ所要時間・rust-cache ヒット・sccache ヒット率を Job Summary へ
      # 出力する (#565)。#417 の sccache stats (ログ出力) を Job Summary 可視化へ
      # 拡張し、バンドルサイズ (#443) / カバレッジ (#482) と同じく可視化のみで
      # fail はさせない。
      - name: Job timing & cache summary (#565)
        if: always()
        run: |
          ELAPSED=$(( $(date +%s) - NOOBDB_JOB_START ))
          {
            echo "### rust (clippy) 所要時間・キャッシュ"
            echo ""
            echo "| 項目 | 値 |"
            echo "| --- | --- |"
            echo "| 所要時間 | ${ELAPSED} 秒 |"
            echo "| rust-cache (target) ヒット | ${{ steps.rust-cache.outputs.cache-hit }} |"
            echo ""
            echo '<details><summary>sccache --show-stats</summary>'
            echo ''
            echo '```'
            sccache --show-stats
            echo '```'
            echo ''
            echo '</details>'
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

  # 依存ライセンスの許可リスト検査と、RustSec Advisory DB による既知脆弱性チェック
  # を cargo-deny で行う (#332)。設定は src-tauri/deny.toml。cargo metadata を読む
  # だけでコンパイルは不要なため、Tauri のシステム依存やフロントエンドビルドは要らず
  # 軽量に走る。cargo-deny は他ツールと同様 taiki-e/install-action でプリビルド
  # バイナリを入れる (新しいアクションを増やさず既存の固定 SHA に揃える)。
  rust-deny:
    name: rust (deny)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-deny
        uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with:
          tool: cargo-deny

      - name: cargo deny check
        run: cargo deny --manifest-path src-tauri/Cargo.toml check

  rust-test:
    name: rust (test)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CARGO_INCREMENTAL: "0"
      # sccache をコンパイルキャッシュとして使う (#417)。カバレッジ計装ビルド
      # (-C instrument-coverage) は sccache がキャッシュ対象外として素通しするため、
      # 主な効果は依存クレートのコンパイルに現れる。rust-cache (target) とは別管理。
      RUSTC_WRAPPER: sccache
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: testdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      # ジョブ全体の所要時間可視化 (#565) の起点。checkout より前に置き、
      # セットアップ込みの壁時計時間を測る。閾値 fail は設けない (可視化のみ)。
      - name: Record job start time (#565)
        run: echo "NOOBDB_JOB_START=$(date +%s)" >> "$GITHUB_ENV"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # RUSTC_WRAPPER=sccache を有効にしているため、rustc を呼ぶ後続ステップより
      # 前に sccache 本体を導入する。
      - name: Install sccache
        uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with:
          tool: sccache

      # clang + mold はビルド高速化用 (src-tauri/.cargo/config.toml が
      # Linux ターゲットのリンカに clang + mold を指定している)。mold で
      # テストバイナリ群のリンク時間を短縮する。
      # openssh-server は SSH トンネル統合テスト (#331) 用。テスト内で sshd を
      # 127.0.0.1:2222 に立て、パスワード/鍵認証のトンネル確立を実走させる。
      - name: System deps (Tauri 2 prerequisites)
        uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1.6.3
        with:
          packages: libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev librsvg2-dev libxdo-dev libayatana-appindicator3-dev build-essential curl wget file libssl-dev clang mold openssh-server
          version: tauri-2-ssh

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Enable pnpm (corepack)
        run: corepack enable

      - name: Get pnpm store directory
        shell: bash
        run: echo "PNPM_STORE_PATH=$(pnpm store path)" >> "$GITHUB_ENV"

      - name: Cache pnpm store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # SSH トンネル統合テスト (#331) 用の sshd を起動し、接続情報を $GITHUB_ENV へ。
      # サービスコンテナ (要イメージ pull) ではなく apt の openssh-server を直接構成
      # する方式 (ローカルでも同手順を再現・検証できる。scripts/ci-setup-sshd.sh)。
      - name: Setup test sshd (SSH tunnel integration)
        run: bash scripts/ci-setup-sshd.sh

      # llvm-tools-preview は cargo-llvm-cov の計装ビルドに必要なコンポーネント。
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        id: rust-cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "./src-tauri -> target"
          key: test

      # sccache のローカルディスクキャッシュを永続化する (ジョブ種別 test で分離)。
      - name: Cache sccache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-${{ runner.os }}-test-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            sccache-${{ runner.os }}-test-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with:
          tool: cargo-nextest

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with:
          tool: cargo-llvm-cov

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build frontend (needed for tauri::generate_context!)
        run: pnpm run build

      # nextest を llvm-cov 計装下で実行し、カバレッジ生データのみ収集する
      # (--no-report)。MySQL/PostgreSQL の両サービスコンテナを指す URL を渡し、
      # 両ドライバの統合テストを CI で実走させる。SQLite は環境変数不要で常に走る。
      # NOOBDB_TEST_SSH_URL / NOOBDB_TEST_SSH_KEY は前段の「Setup test sshd」が
      # $GITHUB_ENV に設定済みで、SSH トンネル統合テスト (#331) もここで実走する。
      - name: cargo llvm-cov nextest
        working-directory: src-tauri
        env:
          NOOBDB_TEST_MYSQL_URL: mysql://root:rootpw@127.0.0.1:3306/testdb
          NOOBDB_TEST_POSTGRES_URL: postgres://postgres:postgres@127.0.0.1:5432/testdb
        run: cargo llvm-cov nextest --no-report --locked --all-targets

      # 収集済みデータから lcov レポートを生成し、サマリ表を Job Summary に出して
      # PR ごとのカバレッジを可視化する。
      - name: Coverage report
        working-directory: src-tauri
        run: |
          cargo llvm-cov report --lcov --output-path lcov.info
          {
            echo '### Rust coverage'
            echo ''
            echo '```'
            cargo llvm-cov report --summary-only
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # 品質ゲート (#290): 行カバレッジが閾値を下回ったら CI を fail させる。
      # サマリ出力の後に置くことで、閾値割れで落ちても Job Summary には実測値が
      # 残り、原因を追いやすくする。
      #
      # 閾値はラチェット式 (下げない) で運用する (#482)。テスト整備の進捗に応じて
      # 実測を**わずかに下回る**値へ段階的に引き上げ、品質の後退を防ぐ。
      # 48 → 60 への更新根拠: 全統合テスト (MySQL/PostgreSQL/SSH を含む) 実走時の
      # 実測が lines 63.3% (Epic #397 のテスト整備 — read-only ゴールデン #444・
      # diff/sync #480・タイムアウト/キャンセル #481・introspection #493・SSH #331 —
      # により上昇)。CI の nextest と libtest で計測差はごく小さい (doctest なし) ため、
      # 実測−約 3pt の 60 を CI で確実に通る保守的なベースラインとする。下げないのが
      # 原則で、次の引き上げは更なるテスト整備で実測が上がってから行う。
      - name: Enforce coverage threshold
        working-directory: src-tauri
        run: cargo llvm-cov report --fail-under-lines 60

      # ジョブ所要時間・rust-cache ヒット・sccache ヒット率を Job Summary へ
      # 出力する (#565)。#417 の sccache stats (ログ出力) を Job Summary 可視化へ
      # 拡張し、バンドルサイズ (#443) / カバレッジ (#482) と同じく可視化のみで
      # fail はさせない。
      - name: Job timing & cache summary (#565)
        if: always()
        run: |
          ELAPSED=$(( $(date +%s) - NOOBDB_JOB_START ))
          {
            echo "### rust (test) 所要時間・キャッシュ"
            echo ""
            echo "| 項目 | 値 |"
            echo "| --- | --- |"
            echo "| 所要時間 | ${ELAPSED} 秒 |"
            echo "| rust-cache (target) ヒット | ${{ steps.rust-cache.outputs.cache-hit }} |"
            echo ""
            echo '<details><summary>sccache --show-stats</summary>'
            echo ''
            echo '```'
            sccache --show-stats
            echo '```'
            echo ''
            echo '</details>'
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

  # Windows ターゲットの PR 事前検証 (#392)。Rust のコンパイル・テストは普段
  # Linux でしか走らず、Windows 固有の挙動 (keyring・ファイルパス・改行コード・
  # MSVC リンカ) のリグレッションは release.yml の main push まで検出できなかった。
  # ここで PR 段階で clippy + SQLite ユニット/統合テストを Windows 上で実行する。
  # Tauri の全スタックビルド (WebView2 等) は不要で、MSVC toolchain のみで足りる。
  # MySQL/PostgreSQL は接続 URL 環境変数を渡さないので統合テストはスキップされ、
  # SQLite 統合テスト (外部サービス不要) は常時実行される。
  #
  # Linux と同じ理由 (rust-clippy / rust-test の分割コメント参照) で clippy と
  # nextest を別ジョブに分けて並列実行する。同一ジョブで直列に走らせると
  # check モードと codegen+link の成果物が共有されず実質二重コンパイルが直列に
  # 積み上がり、Windows ジョブがワークフロー全体のクリティカルパスになっていた
  # (実測 clippy 約 4 分 + nextest 約 4.5 分)。分割で壁時計時間を max() に縮める。
  rust-windows-clippy:
    name: rust (windows clippy)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      CARGO_INCREMENTAL: "0"
      # Linux ジョブと同じく sccache でコンパイルキャッシュを効かせる (#417)。
      # キャッシュキーは runner.os (Windows) を含むので Linux とは自動的に分離される。
      RUSTC_WRAPPER: sccache
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
    steps:
      # ジョブ全体の所要時間可視化 (#565) の起点。checkout より前に置き、
      # セットアップ込みの壁時計時間を測る。閾値 fail は設けない (可視化のみ)。
      # windows-latest の既定シェルは pwsh なので、他の GITHUB_ENV 書き込み
      # ステップと同様に明示的に bash を指定する。
      - name: Record job start time (#565)
        shell: bash
        run: echo "NOOBDB_JOB_START=$(date +%s)" >> "$GITHUB_ENV"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # RUSTC_WRAPPER=sccache を有効にしているため、rustc を呼ぶ後続ステップより
      # 前に sccache 本体を導入する。
      - name: Install sccache
        uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with:
          tool: sccache

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Enable pnpm (corepack)
        run: corepack enable

      - name: Get pnpm store directory
        shell: bash
        run: echo "PNPM_STORE_PATH=$(pnpm store path)" >> "$GITHUB_ENV"

      - name: Cache pnpm store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # Windows では config.toml が MSVC リンカに lld-link を指定している。
      # windows-latest には LLVM がプリインストール済みで lld-link が PATH 上にある。
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      - name: Cache cargo
        id: rust-cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "./src-tauri -> target"
          key: windows-clippy

      - name: Cache sccache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-${{ runner.os }}-windows-clippy-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            sccache-${{ runner.os }}-windows-clippy-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build frontend (needed for tauri::generate_context!)
        run: pnpm run build

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --locked -- -D warnings

      # ジョブ所要時間・rust-cache ヒット・sccache ヒット率を Job Summary へ
      # 出力する (#565)。#417 の sccache stats (ログ出力) を Job Summary 可視化へ
      # 拡張し、バンドルサイズ (#443) / カバレッジ (#482) と同じく可視化のみで
      # fail はさせない。
      - name: Job timing & cache summary (#565)
        if: always()
        shell: bash
        run: |
          ELAPSED=$(( $(date +%s) - NOOBDB_JOB_START ))
          {
            echo "### rust (windows clippy) 所要時間・キャッシュ"
            echo ""
            echo "| 項目 | 値 |"
            echo "| --- | --- |"
            echo "| 所要時間 | ${ELAPSED} 秒 |"
            echo "| rust-cache (target) ヒット | ${{ steps.rust-cache.outputs.cache-hit }} |"
            echo ""
            echo '<details><summary>sccache --show-stats</summary>'
            echo ''
            echo '```'
            sccache --show-stats
            echo '```'
            echo ''
            echo '</details>'
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

  rust-windows-test:
