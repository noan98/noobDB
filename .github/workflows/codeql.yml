name: codeql

on:
  pull_request:
    branches: [main]
  schedule:
    # 毎週月曜 JST 09:00 (UTC 00:00) に定期スキャン
    - cron: "0 0 * * 1"

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  # 変更されたパスを見て解析ジョブを出し分ける (ci.yml と同じ方式)。CodeQL は
  # JS/TS のみを解析するため、Rust やドキュメントだけの PR で走らせても結果は
  # 変わらない。ワークフロー単位の paths: で丸ごとスキップすると必須チェック設定時に
  # 「待機中」で固まるため、ジョブ単位の if: でゲートする (スキップは必須チェックを
  # 満たす)。週次の schedule 実行は常にフル解析する。
  changes:
    name: detect changed areas
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # ハング時にデフォルト 6 時間ランナーを占有し続けるのを防ぐ (正常時は影響なし)。
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      js: ${{ steps.filter.outputs.js }}
    steps:
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          # CodeQL の JS 抽出器はリポジトリ全体の .js/.mjs/.ts/.tsx を対象にする
          # ため、src/ だけでなく scripts/ (bundle-size.mjs 等) も監視する。
          filters: |
            js:
              - 'src/**'
              - 'index.html'
              - 'scripts/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.json'
              - 'tsconfig.node.json'
              - 'vite.config.ts'
              - 'vitest.browser.config.ts'
              - '.github/workflows/codeql.yml'

  analyze:
    name: CodeQL (${{ matrix.language }})
    needs: changes
    # schedule (週次) は常に実行。PR では JS/TS 関連パスに変更があるときだけ実行する。
    # changes ジョブは schedule ではスキップされるため、!cancelled() で「依存ジョブが
    # スキップでも評価する」ようにしている。
    if: >-
      !cancelled() && (
        github.event_name == 'schedule' ||
        needs.changes.outputs.js == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # javascript-typescript は JS/TS ソースを対象にするビルトイン言語名。
        # Rust は CodeQL の実験的サポートであり、成熟度が低くノイズが多いため
        # 当面は JS/TS のみでシグナルを安定させる。
        language: ["javascript-typescript"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          # ノイズの多いルールを抑制してシグナル重視のベースラインから運用開始する。
          # 追加のカスタムクエリは queries: フィールドで指定できる。
          queries: security-extended

      # JS/TS は autobuild で対応できる (ビルド成果物に依存しないため)。
      - name: Autobuild
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:${{ matrix.language }}"
