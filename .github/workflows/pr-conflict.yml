name: pr-conflict

# ベースブランチ (main) とコンフリクトしている open PR を検知し、
# `merge-conflict` ラベルの付与/除去と、PR への通知コメントの作成 / 更新を
# 行う。検知は第三者 action の出力に依存せず、PR の mergeable を自前で
# ポーリングして判定する (GitHub の mergeable は非同期計算で、ベースの
# force-push 直後などは null=unknown になりやすいため、確定するまで待つ)。
#
# 検知の仕組み:
#   - PR が更新されたとき (pull_request) はその PR を判定する。
#   - main が進んだとき (push) は全 open PR を再判定する
#     (他 PR のマージで後追いコンフリクトが発生するケースを拾うため)。
#
# コメントは解消時も削除せず「解消済み」に編集して記録を残す。

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

# 同一 PR / 同一 push に対する重複実行を抑止する。PR の更新 (synchronize)
# では最新コミットだけが意味を持つので途中 run はキャンセルしてよいが、
# main への push では各前進を確実に再評価したいのでキャンセルしない。
concurrency:
  group: pr-conflict-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  detect:
    name: detect merge conflicts
    runs-on: ubuntu-latest
    steps:
      - name: Detect conflicts and sync label + comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { owner, repo } = context.repo;
            const labelName = 'merge-conflict';
            // レンダリングされない隠しマーカー。Bot コメントの一意な目印に使う。
            const marker = '<!-- merge-conflict-bot -->';

            // GitHub の mergeable は非同期計算。null (unknown) の間は
            // 確定するまでポーリングする (eps1lon action の retryAfter/retryMax 相当)。
            const retryAfterMs = 20000;
            const retryMax = 10;
            const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

            const conflictBody = [
              marker,
              '## ⚠️ コンフリクトを検知しました',
              '',
              'この PR はベースブランチ (`main`) とコンフリクトしています。マージ前に解消してください。',
              '',
              '<details><summary>解消手順</summary>',
              '',
              '```sh',
              'git fetch origin',
              'git switch <この PR のブランチ>',
              'git merge origin/main   # もしくは git rebase origin/main',
              '# コンフリクトを解消したら',
              'git add -A && git commit   # rebase の場合は git rebase --continue',
              'git push',
              '```',
              '',
              '</details>',
            ].join('\n');

            const resolvedBody = [
              marker,
              '## ✅ コンフリクトは解消されました',
              '',
              'この PR は現在ベースブランチ (`main`) とコンフリクトしていません。',
              '',
              `_最終確認: ${new Date().toISOString()}_`,
            ].join('\n');

            // 判定対象の PR 番号を集める。
            let prNumbers = [];
            if (context.eventName === 'pull_request') {
              prNumbers = [context.payload.pull_request.number];
            } else {
              try {
                const prs = await github.paginate(github.rest.pulls.list, {
                  owner, repo, state: 'open', base: 'main', per_page: 100,
                });
                prNumbers = prs.map((p) => p.number);
              } catch (e) {
                // PR 一覧の取得が一時的に失敗してもジョブは落とさない。
                // 次の main への push で再評価される。
                core.warning(`pulls.list に失敗: ${e.status || ''} ${e.message}`);
              }
            }

            // mergeable が確定するまで PR を取り直す。確定しなければ null を返す。
            // pulls.get が一時的に失敗 (5xx / レート制限 / マージ直後のレース) しても
            // ジョブを落とさず、404 (PR 消失) は即時 null、それ以外はリトライする。
            async function resolvePr(number) {
              for (let attempt = 0; attempt <= retryMax; attempt++) {
                try {
                  const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: number });
                  if (pr.state !== 'open') return null;
                  if (pr.mergeable !== null) return pr;
                } catch (e) {
                  if (e.status === 404) return null;
                  core.warning(`PR #${number}: pulls.get に失敗 (attempt ${attempt}): ${e.status || ''} ${e.message}`);
                }
                if (attempt < retryMax) await sleep(retryAfterMs);
              }
              return null;
            }

            for (const number of prNumbers) {
              // 1 件の PR 処理で API エラーが起きてもジョブ全体は落とさず次へ進む。
              // (マージ直後のレースや一時的な 5xx / レート制限で個別に失敗しても、
              //  他 PR の処理とジョブの成否を巻き込まないようにする)
              try {
                const pr = await resolvePr(number);
                if (!pr) {
                  core.warning(`PR #${number}: mergeable still unknown after retries; skipping`);
                  continue;
                }
                const isDirty = pr.mergeable === false;

                // ラベルの付与 / 除去。
                const hasLabel = (pr.labels || []).some((l) => (l.name || l) === labelName);
                if (isDirty && !hasLabel) {
                  await github.rest.issues.addLabels({ owner, repo, issue_number: number, labels: [labelName] });
                } else if (!isDirty && hasLabel) {
                  try {
                    await github.rest.issues.removeLabel({ owner, repo, issue_number: number, name: labelName });
                  } catch (e) {
                    if (e.status !== 404) throw e;
                  }
                }

                // 通知コメントを冪等に管理する。
                //   dirty -> マーカー付きコメントが無ければ作成、あれば本文を更新
                //   clean -> マーカー付きコメントがあれば「解消済み」に編集 (削除はしない)
                const comments = await github.paginate(github.rest.issues.listComments, {
                  owner, repo, issue_number: number, per_page: 100,
                });
                const existing = comments.find((c) => c.body && c.body.includes(marker));
                const desired = isDirty ? conflictBody : (existing ? resolvedBody : null);
                if (desired === null) continue;
                if (existing) {
                  if (existing.body !== desired) {
                    await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: desired });
                  }
                } else {
                  await github.rest.issues.createComment({ owner, repo, issue_number: number, body: desired });
                }
              } catch (e) {
                core.warning(`PR #${number}: 処理中にエラー: ${e.status || ''} ${e.message}`);
              }
            }
