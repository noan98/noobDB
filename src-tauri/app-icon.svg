<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5b9cf8"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="body" x1="282" y1="240" x2="742" y2="784" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e8f0fe"/>
    </linearGradient>
  </defs>

  <!-- App background: rounded square with brand gradient -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <!-- Database cylinder -->
  <g>
    <!-- Body -->
    <path d="M282 300 L282 724 A230 84 0 0 0 742 724 L742 300 Z" fill="url(#body)"/>
    <!-- Top cap -->
    <ellipse cx="512" cy="300" rx="230" ry="84" fill="#ffffff"/>
    <!-- Top disc front edge -->
    <path d="M282 300 A230 84 0 0 0 742 300" fill="none" stroke="#bcd4fb" stroke-width="14" stroke-linecap="round"/>
    <!-- Second disc front edge -->
    <path d="M282 432 A230 84 0 0 0 742 432" fill="none" stroke="#bcd4fb" stroke-width="14" stroke-linecap="round"/>
  </g>

  <!-- Friendly face on the front of the cylinder -->
  <g fill="#1e3a8a">
    <circle cx="438" cy="556" r="30"/>
    <circle cx="586" cy="556" r="30"/>
  </g>
  <path d="M430 628 Q512 696 594 628" fill="none" stroke="#1e3a8a" stroke-width="26" stroke-linecap="round"/>
</svg>
